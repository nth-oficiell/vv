<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KzLook ⎯ Services Discord</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #5865f2;
            --primary-dark: #4752c4;
            --secondary: #7858f2;
            --success: #2ecc71;
            --danger: #ff4757;
            --warning: #ffa502;
            --dark: #0a0a0f;
            --darker: #050508;
            --card-bg: rgba(15, 15, 25, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --text: #fff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--darker);
            color: var(--text);
            min-height: 100vh;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, #1a1a3a 0%, var(--darker) 70%);
            z-index: -2;
        }

        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(88, 101, 242, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(88, 101, 242, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        header {
            position: sticky;
            top: 0;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(20px);
            background: rgba(5, 5, 8, 0.7);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            font-size: 0.9rem;
            background: var(--primary);
            -webkit-text-fill-color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            margin-left: 0.8rem;
        }

        .btn-group {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .btn {
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            background: rgba(88, 101, 242, 0.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 0.3rem 1.5rem 0.3rem 0.3rem;
            border-radius: 40px;
            border: 1px solid var(--border);
        }

        .user-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--border);
            color: rgba(255, 255, 255, 0.6);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-logout:hover {
            background: rgba(255, 71, 87, 0.2);
            border-color: var(--danger);
            color: var(--danger);
        }

        .categories {
            display: flex;
            gap: 0.5rem;
            padding: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .category-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: rgba(255, 255, 255, 0.7);
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .category-btn:hover, .category-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .product-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 1.8rem;
            transition: 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px -15px rgba(88, 101, 242, 0.3);
        }

        .product-badge {
            position: absolute;
            top: 1.2rem;
            right: 1.2rem;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-new {
            background: linear-gradient(135deg, var(--danger), #ff6b81);
        }

        .badge-ticket {
            background: linear-gradient(135deg, var(--warning), #ffb83d);
        }

        .product-emoji {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        .product-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .product-category {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .product-price {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .product-price small {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
        }

        .product-stock {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .product-stock.normal {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.2);
            color: var(--success);
        }

        .product-stock.low {
            background: rgba(255, 165, 2, 0.1);
            border: 1px solid rgba(255, 165, 2, 0.2);
            color: var(--warning);
        }

        .product-stock.out {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.2);
            color: var(--danger);
        }

        .btn-buy {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-buy:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.4);
        }

        .btn-buy:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 2.5rem;
            max-width: 450px;
            width: 90%;
            animation: modalIn 0.3s;
        }

        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .modal-tabs {
            display: flex;
            gap: 0.5rem;
            margin: 1.5rem 0;
            background: rgba(255, 255, 255, 0.03);
            padding: 0.5rem;
            border-radius: 50px;
        }

        .modal-tab {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.2s;
        }

        .modal-tab.active {
            background: var(--primary);
            color: white;
        }

        .modal-input {
            width: 100%;
            padding: 1.2rem;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: white;
            font-size: 1rem;
            transition: 0.2s;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(88, 101, 242, 0.1);
        }

        .modal-btn {
            width: 100%;
            padding: 1.2rem;
            border: none;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
        }

        .modal-btn-primary {
            background: var(--primary);
            color: white;
        }

        .modal-btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.4);
        }

        .modal-btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: white;
            margin-top: 0.5rem;
        }

        .modal-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .modal-link {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
        }

        .admin-panel {
            display: none;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .admin-panel.active {
            display: block;
        }

        .admin-header {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 1.8rem;
            position: relative;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0.5rem 0;
        }

        .admin-table {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            overflow-x: auto;
        }

        .admin-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th {
            text-align: left;
            padding: 1rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }

        .admin-table td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .admin-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.5rem;
            color: white;
            width: 80px;
        }

        .admin-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .status-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.5rem;
            color: white;
        }

        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 2000;
        }

        .toast {
            background: rgba(46, 204, 113, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 1rem 2rem;
            border-radius: 20px;
            margin-top: 0.5rem;
            animation: toastIn 0.3s;
            border-left: 4px solid var(--success);
        }

        .toast.error {
            background: rgba(255, 71, 87, 0.9);
            border-left-color: var(--danger);
        }

        @keyframes toastIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 4rem;
            grid-column: 1 / -1;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(88, 101, 242, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            header {
                padding: 1rem;
                flex-direction: column;
                gap: 1rem;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-particles"></div>

    <header>
        <div class="logo">
            KZLOOK <span>SHOP</span>
        </div>
        <div class="btn-group">
            <a href="https://discord.gg/kzlook" target="_blank" class="btn btn-outline">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057.1 18.08.111 18.1.127 18.116a19.876 19.876 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
                </svg>
                Discord
            </a>
            <button class="btn btn-primary" onclick="openAuthModal()" id="login-btn">Connexion</button>
            <div id="user-info" class="user-info" style="display: none;">
                <div class="user-avatar" id="user-avatar">👤</div>
                <span id="user-name"></span>
                <button class="btn-logout" onclick="logout()">✕</button>
            </div>
        </div>
    </header>

    <div class="categories" id="categories"></div>

    <div id="products-container" class="products-grid">
        <div class="loading">
            <div class="spinner"></div>
            <p>Chargement...</p>
        </div>
    </div>

    <!-- Modal Auth -->
    <div class="modal" id="auth-modal">
        <div class="modal-content">
            <div class="modal-tabs">
                <button class="modal-tab active" onclick="switchAuthTab('login')" id="login-tab">Connexion</button>
                <button class="modal-tab" onclick="switchAuthTab('register')" id="register-tab">Inscription</button>
            </div>

            <div id="login-form">
                <h2 class="modal-title">Content de te revoir</h2>
                <input type="email" class="modal-input" id="login-email" placeholder="Email">
                <input type="password" class="modal-input" id="login-password" placeholder="Mot de passe">
                <button class="modal-btn modal-btn-primary" onclick="login()">Se connecter</button>
            </div>

            <div id="register-form" style="display: none;">
                <h2 class="modal-title">Créer un compte</h2>
                <input type="text" class="modal-input" id="register-name" placeholder="Nom d'utilisateur">
                <input type="email" class="modal-input" id="register-email" placeholder="Email">
                <input type="password" class="modal-input" id="register-password" placeholder="Mot de passe">
                <input type="password" class="modal-input" id="register-confirm" placeholder="Confirmer">
                <button class="modal-btn modal-btn-primary" onclick="register()">S'inscrire</button>
            </div>

            <div class="modal-footer">
                <span id="auth-footer">Pas encore de compte ? <span class="modal-link" onclick="switchAuthTab('register')">Inscris-toi</span></span>
            </div>
        </div>
    </div>

    <!-- Modal Commande -->
    <div class="modal" id="order-modal">
        <div class="modal-content">
            <h2 class="modal-title" id="modal-product-name">Confirmation</h2>
            <div style="font-size: 2.5rem; color: var(--primary); font-weight: 700; margin: 1rem 0;" id="modal-product-price">0€</div>
            <input type="text" class="modal-input" id="paypal-name" placeholder="Ton nom PayPal" required>
            <button class="modal-btn modal-btn-primary" onclick="confirmOrder()">Payer avec PayPal</button>
            <button class="modal-btn modal-btn-secondary" onclick="closeOrderModal()">Annuler</button>
        </div>
    </div>

    <!-- Modal Admin -->
    <div class="modal" id="admin-password-modal">
        <div class="modal-content">
            <h2 class="modal-title">🔐 Accès Admin</h2>
            <input type="password" class="modal-input" id="admin-password" placeholder="Mot de passe admin">
            <button class="modal-btn modal-btn-primary" onclick="checkAdminPassword()">Valider</button>
            <button class="modal-btn modal-btn-secondary" onclick="closeAdminModal()">Annuler</button>
        </div>
    </div>

    <!-- Panel Admin -->
    <div id="admin-panel" class="admin-panel">
        <div class="admin-header">
            <h1>Administration</h1>
            <button class="btn btn-primary" onclick="hideAdminPanel()" style="background: var(--danger);">Quitter</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div>Total ventes</div>
                <div class="stat-value" id="total-sales">0€</div>
            </div>
            <div class="stat-card">
                <div>Commandes en attente</div>
                <div class="stat-value" id="pending-orders">0</div>
            </div>
            <div class="stat-card">
                <div>Stock total</div>
                <div class="stat-value" id="total-stock">0</div>
            </div>
            <div class="stat-card">
                <div>Utilisateurs</div>
                <div class="stat-value" id="total-users">0</div>
            </div>
        </div>

        <div class="admin-table">
            <h3>📦 Produits</h3>
            <div id="admin-products"></div>
        </div>

        <div class="admin-table">
            <h3>📋 Commandes</h3>
            <div id="admin-orders"></div>
        </div>

        <div class="admin-table">
            <h3>👥 Utilisateurs</h3>
            <div id="admin-users"></div>
        </div>

        <div class="admin-table">
            <h3>⚙️ Configuration</h3>
            <div style="display: grid; gap: 1rem;">
                <input type="text" id="config-paypal" class="admin-input" style="width: 100%;" placeholder="Lien PayPal.me">
                <input type="text" id="config-discord" class="admin-input" style="width: 100%;" placeholder="Lien Discord">
                <button class="btn btn-primary" onclick="saveConfig()">Sauvegarder</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
        const API_BASE = window.location.origin;
        let currentUser = null;
        let currentProduct = null;
        let adminBuffer = '';

        document.addEventListener('DOMContentLoaded', async () => {
            await loadProducts();
            await checkSession();
            setupCategories();
            setupAdminDetection();
        });

        async function apiCall(endpoint, method = 'GET', data = null) {
            const options = {
                method,
                headers: { 'Content-Type': 'application/json' }
            };
            
            const adminToken = localStorage.getItem('adminToken');
            const userToken = localStorage.getItem('token');
            
            if (adminToken) {
                options.headers['Authorization'] = `Bearer ${adminToken}`;
            } else if (userToken) {
                options.headers['Authorization'] = `Bearer ${userToken}`;
            }
            
            if (data) {
                options.body = JSON.stringify(data);
            }
            
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, options);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                showToast('Erreur de connexion', 'error');
                return null;
            }
        }

        async function loadProducts() {
            const data = await apiCall('/api/products');
            if (data && data.products) {
                displayProducts(data.products);
            }
        }

        function displayProducts(products) {
            const container = document.getElementById('products-container');
            if (!products || !products.length) {
                container.innerHTML = '<div class="loading">Aucun produit</div>';
                return;
            }

            container.innerHTML = products.map(p => {
                const stockClass = p.stock === 0 ? 'out' : (p.stock < 10 ? 'low' : 'normal');
                return `
                <div class="product-card">
                    ${p.isNew ? '<div class="product-badge badge-new">NEW</div>' : ''}
                    ${p.onTicket ? '<div class="product-badge badge-ticket">TICKET</div>' : ''}
                    <div class="product-emoji">${p.emoji}</div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-category">${p.category}</div>
                    <div class="product-price">${p.price}€ <small>EUR</small></div>
                    <div class="product-stock ${stockClass}">
                        ${p.stock > 0 ? `Stock: ${p.stock}` : 'Épuisé'}
                    </div>
                    <button class="btn-buy" onclick="buy('${p.id}')" ${p.stock === 0 ? 'disabled' : ''}>
                        ${p.stock > 0 ? 'Acheter' : 'Indisponible'}
                    </button>
                </div>
            `}).join('');
        }

        function filterProducts(category) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            apiCall(`/api/products${category !== 'all' ? `?category=${category}` : ''}`).then(data => {
                if (data && data.products) displayProducts(data.products);
            });
        }

        function setupCategories() {
            apiCall('/api/products').then(data => {
                if (data && data.products) {
                    const cats = ['all', ...new Set(data.products.map(p => p.category))];
                    document.getElementById('categories').innerHTML = cats.map(c => `
                        <button class="category-btn ${c === 'all' ? 'active' : ''}" onclick="filterProducts('${c}')">
                            ${c === 'all' ? '✨ Tous' : c}
                        </button>
                    `).join('');
                }
            });
        }

        function openAuthModal() {
            document.getElementById('auth-modal').classList.add('active');
        }

        function closeAuthModal() {
            document.getElementById('auth-modal').classList.remove('active');
        }

        function switchAuthTab(tab) {
            document.getElementById('login-tab').classList.toggle('active', tab === 'login');
            document.getElementById('register-tab').classList.toggle('active', tab === 'register');
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
            
            document.getElementById('auth-footer').innerHTML = tab === 'login' 
                ? 'Pas encore de compte ? <span class="modal-link" onclick="switchAuthTab(\'register\')">Inscris-toi</span>'
                : 'Déjà un compte ? <span class="modal-link" onclick="switchAuthTab(\'login\')">Connecte-toi</span>';
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showToast('Veuillez remplir tous les champs', 'error');
                return;
            }

            const data = await apiCall('/api/auth/login', 'POST', { email, password });
            
            if (data && data.token) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                currentUser = data.user;
                updateUIForUser();
                closeAuthModal();
                showToast('Connexion réussie !');
                
                if (currentUser.isAdmin) {
                    showAdminPanel();
                    loadAdminData();
                }
            } else {
                showToast(data?.error || 'Erreur de connexion', 'error');
            }
        }

        async function register() {
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;

            if (!name || !email || !password || !confirm) {
                showToast('Tous les champs sont requis', 'error');
                return;
            }

            if (password !== confirm) {
                showToast('Les mots de passe ne correspondent pas', 'error');
                return;
            }

            const data = await apiCall('/api/auth/register', 'POST', { name, email, password });
            
            if (data && data.token) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                currentUser = data.user;
                updateUIForUser();
                closeAuthModal();
                showToast('Inscription réussie !');
            } else {
                showToast(data?.error || "Erreur d'inscription", 'error');
            }
        }

        async function checkSession() {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            
            if (token && userStr) {
                try {
                    currentUser = JSON.parse(userStr);
                    updateUIForUser();
                } catch (e) {
                    logout();
                }
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            localStorage.removeItem('adminToken');
            currentUser = null;
            updateUIForUser();
            hideAdminPanel();
            showToast('Déconnecté');
        }

        function updateUIForUser() {
            const loginBtn = document.getElementById('login-btn');
            const userInfo = document.getElementById('user-info');
            
            if (currentUser) {
                loginBtn.style.display = 'none';
                userInfo.style.display = 'flex';
                document.getElementById('user-name').textContent = currentUser.name;
                document.getElementById('user-avatar').textContent = currentUser.name.charAt(0).toUpperCase();
            } else {
                loginBtn.style.display = 'flex';
                userInfo.style.display = 'none';
            }
        }

        function buy(productId) {
            if (!currentUser) {
                showToast('Connectez-vous pour acheter', 'error');
                openAuthModal();
                return;
            }

            currentProduct = { id: productId };
            document.getElementById('order-modal').classList.add('active');
        }

        function closeOrderModal() {
            document.getElementById('order-modal').classList.remove('active');
            currentProduct = null;
            document.getElementById('paypal-name').value = '';
        }

        async function confirmOrder() {
            const paypalName = document.getElementById('paypal-name').value.trim();
            if (!paypalName) {
                showToast('Nom PayPal requis', 'error');
                return;
            }

            const data = await apiCall('/api/orders', 'POST', {
                productId: currentProduct.id,
                paypalName
            });

            if (data && data.success) {
                window.open(data.paypalLink + '/' + data.amount, '_blank');
                closeOrderModal();
                showToast('Commande créée !');
                loadProducts();
            } else {
                showToast(data?.error || 'Erreur', 'error');
            }
        }

        function setupAdminDetection() {
            let buffer = '';
            document.addEventListener('keydown', (e) => {
                buffer = (buffer + e.key).slice(-5);
                if (buffer.toLowerCase() === 'admin') {
                    if (currentUser?.isAdmin) {
                        showAdminPanel();
                        loadAdminData();
                    } else {
                        document.getElementById('admin-password-modal').classList.add('active');
                    }
                }
            });
        }

        function closeAdminModal() {
            document.getElementById('admin-password-modal').classList.remove('active');
            document.getElementById('admin-password').value = '';
        }

        async function checkAdminPassword() {
            const password = document.getElementById('admin-password').value;
            
            const data = await apiCall('/api/admin/auth', 'POST', { password });
            
            if (data && data.success) {
                localStorage.setItem('adminToken', data.token);
                closeAdminModal();
                showAdminPanel();
                loadAdminData();
                showToast('Mode admin activé');
            } else {
                showToast('Mot de passe incorrect', 'error');
            }
        }

        function showAdminPanel() {
            document.querySelector('.categories').style.display = 'none';
            document.getElementById('products-container').style.display = 'none';
            document.getElementById('admin-panel').classList.add('active');
        }

        function hideAdminPanel() {
            document.querySelector('.categories').style.display = 'flex';
            document.getElementById('products-container').style.display = 'grid';
            document.getElementById('admin-panel').classList.remove('active');
        }

        async function loadAdminData() {
            const stats = await apiCall('/api/admin/stats');
            if (stats) {
                document.getElementById('total-sales').textContent = stats.totalSales + '€';
                document.getElementById('pending-orders').textContent = stats.pendingOrders;
                document.getElementById('total-stock').textContent = stats.totalStock;
                document.getElementById('total-users').textContent = stats.totalUsers;
            }

            const productsData = await apiCall('/api/admin/products');
            if (productsData && productsData.products) {
                document.getElementById('admin-products').innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Produit</th>
                                <th>Prix</th>
                                <th>Stock</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${productsData.products.map(p => `
                                <tr>
                                    <td>${p.emoji} ${p.name}</td>
                                    <td><input class="admin-input" id="price-${p.id}" value="${p.price}" step="0.1"></td>
                                    <td><input class="admin-input" id="stock-${p.id}" value="${p.stock}"></td>
                                    <td><button class="btn btn-primary" style="padding: 0.3rem 1rem;" onclick="updateProduct('${p.id}')">✓</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }

            const ordersData = await apiCall('/api/admin/orders');
            if (ordersData && ordersData.orders) {
                document.getElementById('admin-orders').innerHTML = ordersData.orders.length ? `
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Client</th>
                                <th>Produit</th>
                                <th>Montant</th>
                                <th>PayPal</th>
                                <th>Statut</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${ordersData.orders.map(o => `
                                <tr>
                                    <td>${o.id.slice(-8)}</td>
                                    <td>${o.userName}</td>
                                    <td>${o.productName}</td>
                                    <td>${o.amount}€</td>
                                    <td>${o.paypalName}</td>
                                    <td>
                                        <select class="status-select" onchange="updateOrderStatus('${o.id}', this.value)">
                                            <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>En attente</option>
                                            <option value="paid" ${o.status === 'paid' ? 'selected' : ''}>Payé</option>
                                            <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>Livré</option>
                                        </select>
                                    </td>
                                    <td><button class="btn btn-primary" style="padding: 0.3rem 1rem; background: var(--danger);" onclick="deleteOrder('${o.id}')">✕</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                ` : '<p>Aucune commande</p>';
            }

            const usersData = await apiCall('/api/admin/users');
            if (usersData && usersData.users) {
                document.getElementById('admin-users').innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nom</th>
                                <th>Email</th>
                                <th>Rôle</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${usersData.users.map(u => `
                                <tr>
                                    <td>${u.id}</td>
                                    <td>${u.name}</td>
                                    <td>${u.email}</td>
                                    <td>${u.isAdmin ? '👑 Admin' : '👤 User'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }

            const configData = await apiCall('/api/config');
            if (configData) {
                document.getElementById('config-paypal').value = configData.paypalMe;
                document.getElementById('config-discord').value = configData.discordInvite;
            }
        }

        async function updateProduct(id) {
            const price = document.getElementById(`price-${id}`).value;
            const stock = document.getElementById(`stock-${id}`).value;
            
            const data = await apiCall(`/api/admin/products/${id}`, 'PUT', { price, stock });
            if (data && data.success) {
                showToast('Produit mis à jour');
                loadAdminData();
                loadProducts();
            }
        }

        async function updateOrderStatus(id, status) {
            const data = await apiCall(`/api/admin/orders/${id}`, 'PUT', { status });
            if (data && data.success) {
                showToast('Statut mis à jour');
            }
        }

        async function deleteOrder(id) {
            if (confirm('Supprimer cette commande ?')) {
                const data = await apiCall(`/api/admin/orders/${id}`, 'DELETE');
                if (data && data.success) {
                    showToast('Commande supprimée');
                    loadAdminData();
                }
            }
        }

        async function saveConfig() {
            const paypalMe = document.getElementById('config-paypal').value;
            const discordInvite = document.getElementById('config-discord').value;
            
            const data = await apiCall('/api/admin/config', 'PUT', { paypalMe, discordInvite });
            if (data && data.success) {
                showToast('Configuration sauvegardée');
            }
        }

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = msg;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
